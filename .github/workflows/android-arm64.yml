name: android-arm64

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      curl_version:
        description: curl version to build, or latest
        required: false
        default: latest
      boringssl_ref:
        description: BoringSSL git ref
        required: false
        default: master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            make \
            cmake \
            ninja-build \
            pkg-config \
            perl

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Build curl for Android arm64
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973
          CURL_VERSION: ${{ inputs.curl_version || 'latest' }}
          BORINGSSL_REF: ${{ inputs.boringssl_ref || 'master' }}
        run: |
          chmod +x scripts/build-android-arm64.sh
          ./scripts/build-android-arm64.sh

      - name: Package artifact
        run: tar -czf curl-android-arm64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: curl-android-arm64
          path: curl-android-arm64.tar.gz
